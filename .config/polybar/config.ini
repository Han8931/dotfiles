[bar/main]
width = 100%
height = 28
background = #1e1e2e
foreground = #cdd6f4
font-0 = JetBrainsMono Nerd Font:size=10
bottom = true

modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu battery

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %name%
label-focused-background = #89b4fa
label-focused-foreground = #11111b
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-padding = 2

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = VOL <label-volume>
label-volume = %percentage%%
format-muted = muted

[module/cpu]
type = internal/cpu
label = CPU %percentage%%

[module/memory]
type = internal/memory
label = RAM %percentage_used%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
poll-interval = 5
label-charging = BAT %percentage%%+
label-discharging = BAT %percentage%%
label-full = BAT %percentage%% full
